<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>BOMAX KOC Worker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --bg-sidebar: #ffffff;
      --border-light: #ebebeb;
      --border-hover: #d1d5db;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-light: #eff6ff;
      --color-primary-mid: #2563eb1f;
      --color-success: #16a34a;
      --color-success-light: #16a34a14;
      --color-warning: #d97706;
      --color-warning-light: #d9770614;
      --color-error: #dc2626;
      --color-error-light: #dc262614;
      --color-info: #2563eb;
      --color-info-light: #2563eb14;

      /* Chromatic Shadows */
      --shadow-xs: 0 1px 2px rgba(17, 24, 39, 0.04);
      --shadow-sm: 0 1px 3px rgba(17, 24, 39, 0.06), 0 1px 2px rgba(17, 24, 39, 0.04);
      --shadow-md: 0 4px 12px rgba(37, 99, 235, 0.08), 0 2px 6px rgba(17, 24, 39, 0.04);
      --shadow-lg: 0 10px 30px rgba(37, 99, 235, 0.12), 0 4px 12px rgba(17, 24, 39, 0.08);

      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-pill: 999px;

      --transition: .15s cubic-bezier(.4, 0, .2, 1);
      --transition-slow: .25s cubic-bezier(.4, 0, .2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-xs);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background-color: var(--color-primary);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.4);
    }

    .logo-title {
      font-size: 18.4px;
      font-weight: 700;
      letter-spacing: -0.42px;
      color: var(--text-primary);
    }

    .logo-title span {
      color: var(--color-primary);
    }

    .app-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 600;
      background-color: var(--color-primary-light);
      color: var(--color-primary);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      border: 0.57px solid rgba(37, 99, 235, 0.15);
    }

    .status-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--text-muted);
    }

    .status-indicator.idle { background-color: var(--text-muted); }
    .status-indicator.launching-browser { background-color: var(--color-warning); animation: pulse 1.5s infinite; }
    .status-indicator.waiting-login { background-color: var(--color-warning); animation: pulse 1.5s infinite; }
    .status-indicator.scraping { background-color: var(--color-success); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* Main Container */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 24px;
      gap: 24px;
    }

    /* Left Sidebar: Controls */
    .sidebar {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .panel {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: var(--shadow-sm);
    }

    .panel-title {
      font-size: 12.8px;
      font-weight: 700;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 8px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12.8px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input, select {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      outline: none;
      transition: var(--transition);
    }

    input:focus, select:focus {
      border-color: var(--color-primary);
      background-color: var(--bg-secondary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    /* Button styles mapped from design system */
    button {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13.12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Filled Button 2 style (Primary CTA) */
    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
      border: 0.57px solid var(--color-primary);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--color-primary-hover);
    }

    .btn-primary:disabled {
      background: #e2e8f0;
      color: var(--text-muted);
      border-color: #e2e8f0;
      cursor: not-allowed;
    }

    /* Start Button (Success style) */
    #btnStart {
      background: var(--color-success);
      color: #ffffff;
      border: 0.57px solid var(--color-success);
    }
    
    #btnStart:hover:not(:disabled) {
      background: #15803d;
      box-shadow: 0 0 10px rgba(22, 163, 74, 0.2);
    }

    #btnStart:disabled {
      background: #e2e8f0;
      color: var(--text-muted);
      border-color: #e2e8f0;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Filled Button (Secondary) */
    .btn-secondary {
      background: #ffffff;
      color: var(--text-secondary);
      border: 0.57px solid var(--border-light);
      box-shadow: var(--shadow-xs);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #f8f9fa;
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    /* Danger Button */
    .btn-danger {
      background: var(--color-error-light);
      color: var(--color-error);
      border: 0.57px solid rgba(220, 38, 38, 0.15);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(220, 38, 38, 0.12);
    }

    .btn-danger:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Right Section: Stats & Logs */
    .display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow: hidden;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: var(--shadow-sm);
    }

    .stat-label {
      font-size: 12.8px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.66px;
    }

    .stat-card.success .stat-value { color: var(--color-success); }
    .stat-card.warning .stat-value { color: var(--color-warning); }
    .stat-card.info .stat-value { color: var(--color-info); }

    /* Console Terminal (Light Theme style) */
    .terminal-container {
      flex: 1;
      background-color: #f8fafc;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-xs);
    }

    .terminal-header {
      background-color: #ffffff;
      border-bottom: 1px solid var(--border-light);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.2px;
      color: var(--text-secondary);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .terminal-title::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      background-color: #ef4444;
      border-radius: 50%;
      box-shadow: 12px 0 0 #f59e0b, 24px 0 0 #10b981;
      margin-right: 24px;
    }

    .terminal-clear {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 6px;
      border-radius: var(--radius-xs);
      font-weight: 500;
    }

    .terminal-clear:hover {
      color: var(--text-secondary);
      background: #f1f5f9;
    }

    .terminal-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.8px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-line {
      display: flex;
      gap: 12px;
      word-break: break-all;
    }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
      user-select: none;
    }

    .log-text {
      color: #334155;
    }

    /* Log highlights aligned with light palette */
    .log-text.success { color: var(--color-success); font-weight: 600; }
    .log-text.warning { color: var(--color-warning); }
    .log-text.danger { color: var(--color-error); font-weight: 600; }
    .log-text.info { color: var(--color-info); }
    .log-text.system { color: #6c63ff; font-weight: 500; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-container">
      <div class="logo-dot"></div>
      <div class="logo-title">BOMAX <span>KOC Worker</span></div>
    </div>
    
    <div class="app-status">
      <div id="statusIndicator" class="status-indicator idle"></div>
      <span id="statusLabel">Chưa khởi động</span>
    </div>
  </header>

  <!-- Content -->
  <div class="main-content">
    
    <!-- Left Panel -->
    <div class="sidebar">
      
      <!-- Configuration Panel -->
      <div class="panel">
        <div class="panel-title">Thiết lập cào</div>
        
        <div class="form-group">
          <label for="brandInput">Tên Brand (Nhãn hàng)</label>
          <input type="text" id="brandInput" value="" placeholder="Nhập Brand để phân loại KOC...">
        </div>

        <div class="form-group">
          <label for="maxInput">Giới hạn số KOC cần cào</label>
          <input type="number" id="maxInput" value="3" min="0" placeholder="0 = Cào tất cả">
        </div>

        <div class="form-group">
          <label for="channelSelect">Trình duyệt sử dụng</label>
          <select id="channelSelect">
            <option value="chrome">Google Chrome (Khuyên dùng)</option>
            <option value="msedge">Microsoft Edge</option>
            <option value="">Playwright Chromium Default</option>
          </select>
        </div>

        <div class="form-group">
          <label for="apiUrlInput">API Hub URL</label>
          <input type="text" id="apiUrlInput" value="" placeholder="Äá»ƒ trá»‘ng Ä‘á»ƒ dÃ¹ng endpoint máº·c Ä‘á»‹nh BOMAX">
        </div>
      </div>

      <!-- Controls Panel -->
      <div class="panel" style="margin-top: auto;">
        <button id="btnLaunch" class="btn-primary">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
          Mở trình duyệt
        </button>
        
        <button id="btnStart" class="btn-primary" disabled>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
          Bắt đầu cào KOC
        </button>
        
        <button id="btnStop" class="btn-danger" disabled>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
          Dừng chạy
        </button>

        <button id="btnOpenFolder" class="btn-secondary">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          Mở thư mục kết quả
        </button>
        <button id="btnUpdate" class="btn-secondary">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-2.64-6.36M21 3v6h-6"/></svg>
          Kiá»ƒm tra cáº­p nháº­t
        </button>
      </div>

    </div>

    <!-- Right Panel: Logs & Stats -->
    <div class="display-area">
      
      <!-- Stats Dashboard -->
      <div class="stats-grid">
        <div class="stat-card info">
          <div class="stat-label">Đang xử lý</div>
          <div id="statCurrent" class="stat-value" style="font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 4px 0;">Sẵn sàng</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">Đã gửi lên Hub</div>
          <div id="statSent" class="stat-value">0</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">Bỏ qua / Lỗi</div>
          <div id="statSkipped" class="stat-value">0</div>
        </div>
      </div>

      <!-- Console Logger -->
      <div class="terminal-container">
        <div class="terminal-header">
          <div class="terminal-title">Bảng điều khiển & Log tiến trình</div>
          <button id="btnClearLogs" class="terminal-clear">Xóa log</button>
        </div>
        <div id="terminalBody" class="terminal-body">
          <div class="log-line">
            <span class="log-time">[Hệ thống]</span>
            <span class="log-text system">Chào mừng bạn đến với BOMAX KOC Worker. Điền thông tin và bấm 'Mở trình duyệt' để bắt đầu.</span>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
